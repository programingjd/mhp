<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;font:3vmin monospace;background:#222;color:#eee}
body{min-height:100%;padding:1rem;display:grid;place-items:center}
main{display:flex;flex-direction:column}
a{color:inherit}
</style>
</head>
<body>
<main>
  <a>Generating proof of work...</a>
</main>
</body>
<script type="module">
import generate from './pow.mjs';

const link=document.querySelector('main>a');
const nonce=new Uint8Array(16);
crypto.getRandomValues(nonce);
link.setAttribute('download',`${[...nonce].map(it=>it.toString(16).padStart(2,'0')).join('')}`);
const proof=await generate(nonce);
const blob=new Blob([proof],{type: 'application/octet-stream'});
link.href=URL.createObjectURL(blob);
link.textContent=`Proof of work generated (${proof.length}b)`;
</script>
</html>
