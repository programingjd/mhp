<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comments</title>
<style>
:root{
  color-scheme:dark only;
}
html{
  width:100%;height:100%;
  font:400 clamp(8pt, 1vw + 1vh, 24pt)/1.25 sans-serif;
  background:#222;color:#ddd;
}
body{
  margin:0;padding:2em;min-height:100%;box-sizing:border-box;
  display:grid;grid-template-rows:1fr;grid-template-columns:1fr;justify-items:center;align-items:stretch;
}
main{
  &{
    width:min(100vw - 4em, 60ch);
    display:flex;flex-direction:column;justify-content:space-evenly;align-items:stretch;
  }
  h2{text-align:center;font-size:1.5em;margin:0;padding:1em;color:#ffb}
  ul{
    &{display:flex;flex-direction:column;gap:1em;margin:0;padding:0}
    li{
      &{
        display:flex;flex-direction:column;gap:.5em;
        list-style:none;background:#333;border-radius:1em;padding:.5em 1em;
      }
      header{display:flex;justify-content:space-between;font-size:.75em;color:#999}
      p{padding:0;margin:0}
    }
  }
  form{
    &{
      padding:1em;
      display:grid;
      grid-template-rows: repeat(3, auto);
      grid-template-columns: 1fr;
      gap:1em;
    }
    button{
      &{
        justify-self:center;padding:.5em 1em;
        appearance:none;
        background:#333;color:#eee;border:1px solid rgb(from currentColor r g b / .25);border-radius:.5em;
        cursor:pointer;
      }
      &:hover{background:#555;color:#fff}
    }
    input{
      &{
        appearance:none;
        background:none;color:currentColor;border:none;outline:none;
        font:inherit;font-family:monospace;line-height:1;
        border-bottom:1px solid rgb(from currentColor r g b / .5);
      }
      &:focus{border-bottom:2px solid #67b}
    }
    textarea{
      &{
        appearance:none;
        background:none;color:currentColor;outline:none;font:inherit;font-family:monospace;padding:1em;
        border:1px solid rgb(from currentColor r g b / .5);
        border-radius:.5em;
        field-sizing:content;
      }
      &:focus{border:2px solid #67b}
    }
  }
}
</style>
</head>
<body>
<main>
  <div>
    <h2>Comments</h2>
    <ul id="comments"></ul>
  </div>
  <form>
    <input aria-label="Name" placeholder="Name" id="name" type="text" required>
    <textarea aria-label="Comment" placeholder="Comment" id="content" required></textarea>
    <button type="submit">Post new comment</button>
  </form>
</main>
<template id="comment">
  <li itemscope itemtype="https://schema.org/Comment">
    <header>
      <div itemprop="author" itemscope itemtype="https://schema.org/Person">
        <meta itemprop="name" content="">
        <span></span>
      </div>
      <time itemprop="datePublished" datetime="yyyy-MM-dd"></time>
    </header>
    <p itemprop="text"></p>
  </li>
</template>
<script type="module">
/**
 * @typdef {Record<string,*>} Comment
 * @property {number} timestamp - Unix timestamp
 * @property {string} author - Comment author
 * @property {string} content - Comment text content
 */
const container=document.getElementById('comments');

/** @return {Promise<Comment[]>} */
async function fetchComments(){
  return [
    {timestamp: 1755003600,author: 'John D.',content: 'First!'},
    {timestamp: 1757840580,author: 'Mike T.',content: 'Great project! I hate CAPTCHAs.'}
  ];
  // const response=await fetch('/comments');
  // return response.json();
}

async function updateComments(){
  const count=container.childElementCount;
  const newComments=(await fetchComments()).filter((_,i)=>i>=count);
  container.append(...newComments.map(comment=>{
    const dom=document.importNode(document.getElementById('comment').content,true).firstElementChild;
    const {author,timestamp,content}=comment;
    const authorNameMeta=dom.querySelector('[itemprop="author"] meta[itemprop="name"]');
    authorNameMeta.setAttribute('content',author);
    const authorNameSpan=dom.querySelector('[itemprop="author"] span');
    authorNameSpan.textContent=author;
    const date=new Date(timestamp*1000);
    const time=dom.querySelector('time');
    const dateParts=Object.fromEntries(
      new Intl.DateTimeFormat('en-US',{
        year: 'numeric',month: '2-digit',day: '2-digit'
      }).formatToParts(date).map(it=>[it.type,it.value])
    );
    time.setAttribute('datetime',`${dateParts.year}-${dateParts.month}-${dateParts.day}`);
    time.textContent=new Intl.DateTimeFormat(undefined,{dateStyle: 'short',timeStyle: 'short'}).format(date);
    const contentParagraph=dom.querySelector('p');
    contentParagraph.textContent=content;
    return dom;
  }));
}

await updateComments();
</script>
</body>
</html>
